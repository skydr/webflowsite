document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('.w-tab-link').forEach(function(tab) {
    tab.addEventListener('click', function() {
      var tabId = this.getAttribute('data-w-tab');
      var tabsEl = this.closest('.w-tabs');
      tabsEl.querySelectorAll('.w-tab-link').forEach(function(t) { t.classList.remove('w--current'); });
      tabsEl.querySelectorAll('.w-tab-pane').forEach(function(p) { p.classList.remove('w--tab-active'); });
      this.classList.add('w--current');
      var pane = tabsEl.querySelector('.w-tab-pane[data-w-tab="' + tabId + '"]');
      if (pane) pane.classList.add('w--tab-active');
    });
  });
  document.querySelectorAll('.w-dropdown').forEach(function(dd) {
    dd.addEventListener('mouseenter', function() {
      var list = this.querySelector('.w-dropdown-list');
      if (list) list.style.display = 'block';
    });
    dd.addEventListener('mouseleave', function() {
      var list = this.querySelector('.w-dropdown-list');
      if (list) list.style.display = '';
    });
  });
});
</script>
